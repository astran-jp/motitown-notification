<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>アカウントがログアウトされてしまった方へ｜モチタン</title>
  <meta property="og:title" content="アカウントがログアウトされてしまった方へ">
  <meta property="og:type" content="article">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0D4962;
      --text: #333333;
      --btn: #333333;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    img {
      max-width: 100%;
    }

    body {
      background: #fff;
      font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      word-break: break-word;
    }

    /* 流動カラム：固定px幅を持たせずレスポンシブに */
    .wrap {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
    }

    /* ヘッダーバナー（全幅・比率維持） */
    .banner {
      display: block;
      width: 100%;
      height: auto;
    }

    /* 本文コンテナ：左右パディングで余白を作る */
    .content {
      padding: 18px 22px 40px;
    }

    h1.title {
      margin: 0 0 18px;
      color: var(--navy);
      font-weight: 700;
      font-size: 21px;
      line-height: 1.5;
      letter-spacing: .02em;
    }

    p.lead {
      font-size: 15.5px;
      line-height: 1.9;
      letter-spacing: .02em;
      margin: 18px 0;
    }

    p.note {
      font-size: 15.5px;
      line-height: 1.9;
      letter-spacing: .02em;
      margin: 18px 0;
    }

    p.note-sm {
      font-size: 14px;
      line-height: 1.8;
      letter-spacing: .02em;
      margin: 24px 0 0;
      color: var(--text);
    }

    /* 画面イメージ */
    .screenshot {
      display: block;
      width: 100%;
      max-width: 380px;
      margin: 24px auto 0;
      border: 1px solid #E2E8EA;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 5px 12px rgba(147, 149, 169, .25);
    }

    .screenshot img {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <!-- ヘッダーバナー -->
    <img class="banner" src="assets/header.webp" alt="モチタン" width="1328" height="392">

    <div class="content">

      <h1 class="title">アカウントがログアウトされてしまった方へ</h1>

      <p class="lead">一部プレイヤーにおいて、アカウントがログアウトされてしまっている事象を確認しております。<br><br>初期画面よりサインインしていただくか、別の新しいアカウントを作成した場合でも、[マイページ]
        &gt;
        [設定] &gt; [モチタウンでサインイン]より以前のアカウントでサインインしていただくことができます。</p>

      <div class="screenshot">
        <img src="assets/signin.png" alt="設定 ＞ モチタウンでサインイン">
      </div>

      <p class="note-sm">※過去の配信はモチタウン&gt;右上のメールボックスから確認できます。</p>

    </div>
  </div>
</body>

</html>
