<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ウィジェット機能の導入！【Android版】｜モチタン</title>
<meta property="og:title" content="ウィジェット機能の導入！【Android版】">
<meta property="og:type" content="article">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0D4962;
    --date:#7C878A;
    --line:#99A7AA;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  img{max-width:100%;}
  body{
    background:#fff;
    font-family:"Noto Sans JP",-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    color:var(--navy);
    -webkit-font-smoothing:antialiased;
    word-break:break-word;
  }

  /* 流動カラム：固定px幅を持たせずレスポンシブに */
  .wrap{width:100%;max-width:430px;margin:0 auto;background:#fff;}

  /* ヘッダーバナー（全幅・比率維持） */
  .banner{display:block;width:100%;height:auto;}

  /* 本文コンテナ：左右パディングで余白を作る */
  .content{padding:14px 22px 40px;}

  h1.title{margin:0 0 8px;color:var(--navy);font-weight:700;font-size:20px;line-height:1.5;letter-spacing:.02em;}
  .date{color:var(--date);font-size:16.5px;line-height:1.4;letter-spacing:.02em;margin:0 0 18px;}

  p.lead{font-size:15.5px;line-height:1.9;letter-spacing:.02em;margin:18px 0;}

  h2.subhead{margin:26px 0 14px;color:var(--navy);font-weight:700;font-size:17px;line-height:1.6;letter-spacing:.02em;}

  /* 設定方法の図解（中央寄せ・比率維持） */
  .setup{display:block;width:300px;max-width:100%;height:auto;margin:0 auto;}

  p.note-sm{font-size:15.5px;line-height:1.9;letter-spacing:.02em;margin:28px 0 0;}

  /* お知らせの場所カード（標準スタイル: スクショ切り抜き＋赤矢印） */
  .place{
    position:relative;width:257px;height:179px;margin:24px auto 0;
    background:#E7F6FF;border-radius:20px;overflow:hidden;
    box-shadow:0 5px 5px rgba(147,149,169,.3);
  }
  .place .shot{
    position:absolute;left:13.5px;top:36.17px;width:230px;height:106px;
    border:1px solid var(--line);border-radius:20px;overflow:hidden;
    box-shadow:0 5px 5px rgba(147,149,169,.3);
  }
  .place .shot img{position:absolute;left:0;top:-20.5%;width:100%;height:470.85%;max-width:none;}
  .place .arrow{position:absolute;left:236.23px;top:110.4px;width:19.092px;height:19.092px;display:flex;align-items:center;justify-content:center;}
  .place .arrow .line{transform:rotate(45deg);}
  .place .arrow img{display:block;width:27px;height:14.2px;}
</style>
</head>
<body>
  <div class="wrap">

    <!-- ヘッダーバナー（おつかれウィジェット） -->
    <img class="banner" src="assets/header.png" alt="モチベアのウィジェット" width="390" height="125">

    <div class="content">

      <h1 class="title">ウィジェット機能の導入！【Android版】</h1>
      <p class="date">2026/06/22 17:00</p>

      <p class="lead">Androidのみなさまお待たせしました！ウィジェットを設定すると毎日モチベアがホーム画面でみんなを応援します！連続記録の管理にも役立ちます。</p>

      <h2 class="subhead">ウィジェットの設定方法</h2>
      <img class="setup" src="assets/setup.png" alt="ウィジェットの設定方法：モチタンアプリを長押ししてね" width="300" height="522">

      <p class="note-sm">※過去の配信はモチタウン&gt;右上のメールボックスから確認できます。</p>

      <div class="place">
        <div class="shot">
          <img src="assets/location.png" alt="お知らせの場所">
        </div>
        <div class="arrow">
          <div class="line"><img src="assets/arrow.svg" alt=""></div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
